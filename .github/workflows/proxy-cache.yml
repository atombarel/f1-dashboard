name: CI/CD Proxy Cache

on:
  push:
    branches: [ main ]
    paths:
      - 'cloudflare-worker/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'cloudflare-worker/**'
  workflow_dispatch:
    inputs:
      reset_cache:
        description: 'Delete all rows from D1 cache tables'
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./cloudflare-worker
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: ./cloudflare-worker/package-lock.json
    
    - name: Install dependencies
      run: npm i
    
    - name: Check and run migrations
      run: |
        echo "Checking migration status..."
        
        # Try to apply migrations directly, ignoring errors if already applied
        echo "📝 Attempting to apply migrations..."
        npx wrangler d1 migrations apply f1-api-cache-db --env production --remote || {
          echo "⚠️ Migration command returned error (likely already applied)"
          echo "✅ Continuing with deployment..."
        }
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    - name: Reset D1 cache rows
      if: ${{ contains(github.event.head_commit.message, '[reset-cache]') || inputs.reset_cache }}
      run: |
        npx wrangler d1 execute f1-api-cache-db --env production --remote --command "DELETE FROM request_logs"
        npx wrangler d1 execute f1-api-cache-db --env production --remote --command "DELETE FROM cache_analytics"
        npx wrangler d1 execute f1-api-cache-db --env production --remote --command "DELETE FROM api_cache"
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    
    - name: Deploy to Cloudflare Workers
      run: npx wrangler deploy --env production
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
